upstream traefik_http {
    server master:30080;
    server ip-10-0-14-163.eu-west-3.compute.internal:30080;
    # server worker-2:30080;
    # server worker-3:30080;
    # server worker-4:30080;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    location / {
        proxy_pass http://traefik_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


server {
    server_name whoami.kwer.fr; # managed by Certbot


    location / {
        proxy_pass http://traefik_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/whoami.kwer.fr/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/whoami.kwer.fr/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = whoami.kwer.fr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80 ;
    server_name whoami.kwer.fr;
    return 404; # managed by Certbot


}
